<!DOCTYPE html>
<html>
<head>
  <title>ARK CAFE</title>
  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:40px;
    }
    .box{
      background:white;
      padding:30px;
      border-radius:20px;
      max-width:500px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    button{
      background:#6f4e37;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>☕ ARK CAFE</h1>
    <p>Best cafe forever</p>

    <h2>Menu</h2>
    <p>Latte - Rs 250</p>
    <p>Cappuccino - Rs 280</p>
    <p>Hot Dog - Rs 220</p>

    <button>Order Now</button>
  </div>
</body>
</html>
